<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Meeting Minutes Pro</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="ambient-background">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="app-layout" id="appLayout">
        <!-- GLOBAL HEADER -->
        <header class="navbar">
            <div class="logo">
                <div class="logo-mark">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span>Minutes<span class="highlight">.AI</span></span>
            </div>
            
            <div class="navbar-actions">
                <div class="selector-group">
                    <label for="targetLang">Translate:</label>
                    <div class="dropdown-wrapper">
                        <select id="targetLang">
                            <option value="en">English (Native)</option>
                            <option value="es">Español</option>
                            <option value="fr">Français</option>
                            <option value="de">Deutsch</option>
                            <option value="zh">中文</option>
                            <option value="ja">日本語</option>
                            <option value="ko">한국어</option>
                        </select>
                        <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
                    </div>
                </div>
                <div class="selector-group">
                    <label for="modelSize">Engine:</label>
                    <div class="dropdown-wrapper">
                        <select id="modelSize">
                            <option value="base">Whisper Base</option>
                            <option value="small">Whisper Small</option>
                            <option value="large">Whisper Large</option>
                        </select>
                        <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
                    </div>
                </div>
            </div>
        </header>

        <!-- DASHBOARD GRID -->
        <main class="dashboard-grid state-initial" id="dashboardGrid">
            
            <!-- LEFT PANEL: Ingestion & Raw Data -->
            <section class="panel panel-left">
                
                <!-- UPLOAD CARD (Morphs to small when processing) -->
                <div class="glass-card upload-container" id="uploadZone">
                    <div class="upload-header">
                        <h2>Audio Ingestion</h2>
                        <p>Upload a meeting file or record live.</p>
                    </div>

                    <div class="drag-drop-area" id="uploadArea">
                        <div class="icon-ring">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </div>
                        <span class="primary-text">Drag & drop meeting audio</span>
                        <span class="secondary-text">or <label for="audioFile" class="browse-link" tabindex="0">browse files</label></span>
                        <input type="file" id="audioFile" accept="audio/*" hidden>
                        <div class="format-badges">
                            <span class="badge">MP3</span><span class="badge">WAV</span><span class="badge">M4A</span>
                        </div>
                    </div>

                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <button class="btn-primary record-btn" id="recordBtn">
                        <div class="pulse-ring"></div>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="22"></line>
                        </svg>
                        <span id="recordText">Live Record Meeting</span>
                    </button>
                    <!-- Audio Visualizer (Hidden until recording) -->
                    <div class="visualizer-container hidden" id="visualizer">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                </div>

                <!-- PROCESSING STATE (Hidden initially) -->
                <div class="glass-card processing-container hidden" id="progressSection">
                    <div class="ai-scanning-animation">
                        <div class="scan-line"></div>
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="2" y="2" width="20" height="20" rx="4"></rect>
                            <path d="M12 8v8M8 12h8"></path>
                        </svg>
                    </div>
                    <div class="status-content">
                        <h3 id="progressPhase">Establishing Neural Pipeline...</h3>
                        <p class="status-detail" id="progressText">Quantizing audio arrays and initializing Faster-Whisper...</p>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>

                <!-- TRANSCRIPT CARD (Hidden initially) -->
                <div class="glass-card transcript-container hidden" id="transcriptSection">
                    <div class="card-top-bar">
                        <div class="title-with-badge">
                            <h3>Raw Transcription</h3>
                            <span class="lang-pill" id="detectedLang">EN</span>
                        </div>
                        <button class="icon-btn" data-copy="transcriptText" title="Copy Transcript">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                    <div class="scrollable-content type-mono" id="transcriptText"></div>
                </div>

            </section>

            <!-- RIGHT PANEL: Intelligence & Outputs (Hidden initially) -->
            <section class="panel panel-right hidden" id="summarySection">
                <div class="glass-card summary-container">
                    <div class="card-top-bar sticky-top">
                        <div class="title-with-badge">
                            <div class="sparkle-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                    <path d="M12 2l3 6 6 3-6 3-3 6-3-6-6-3 6-3 3-6z"/>
                                </svg>
                            </div>
                            <h3>Executive Meeting Minutes</h3>
                        </div>
                        <div class="action-buttons">
                            <button class="icon-btn tooltip" data-copy="summaryContent" aria-label="Copy Markdown">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                <span class="tooltip-text">Copy</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="markdown-prose" id="summaryContent">
                        <!-- Morphing Markdown renders here -->
                    </div>

                    <div class="bottom-actions">
                        <button class="btn-secondary" id="newMeetingBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                            New Session
                        </button>
                        <button class="btn-primary" id="exportPdfBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Export Official PDF
                        </button>
                    </div>
                </div>
            </section>
            
        </main>

        <!-- Toast Notifications (Absolute positioned) -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <script src="app.js?v=4"></script>
</body>
</html>
